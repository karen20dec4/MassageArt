<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testare funcție mail()</title>
</head>
<body>
    <h1>Testare funcție mail()</h1>
    <form action="mail_test.php" method="POST">
        <div>
            <label for="email">Adresa ta de email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <button type="submit">Trimite email de test</button>
    </form>
    <div id="result"></div>

    <script>
        const form = document.querySelector('form');
        const resultDiv = document.getElementById('result');

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            const formData = new FormData(form);

            fetch('mail_test.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.text())
            .then(data => {
                resultDiv.innerHTML = data;
            })
            .catch(error => {
                resultDiv.innerHTML = 'A apărut o eroare la trimiterea cererii.';
            });
        });
    </script>
</body>
</html>
